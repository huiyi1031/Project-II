<!-- Asset Management -->
<div class="fade-in space-y-4">
  <div class="pms-card">
    <h4 class="section-title">Asset Management</h4>
    <table class="pms-table">
      <thead>
        <tr><th>Asset ID</th><th>Name</th><th>Type</th><th>Location</th><th>Risk Score</th><th>Risk Level</th><th>Status</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let a of assets">
          <td class="font-mono text-xs text-blue">AST-{{ a.assetID }}</td>
          <td class="font-semibold">{{ a.assetName }}</td>
          <td>{{ a.assetType }}</td><td class="text-muted">{{ a.location }}</td>
          <td class="font-bold" [class.text-danger]="a.riskScore >= 80" [class.text-warning]="a.riskScore >= 60 && a.riskScore < 80">
            {{ a.riskScore | number:'1.1-1' }}
          </td>
          <td><app-status-badge [status]="a.riskLevel"></app-status-badge></td>
          <td><app-status-badge [status]="a.status"></app-status-badge></td>
        </tr>
        <ng-container *ngIf="assets.length === 0">
          <tr>
            <td class="font-mono text-xs text-blue">AST-301</td>
            <td class="font-semibold">Lift A</td><td>Lift</td><td class="text-muted">Block A</td>
            <td class="font-bold text-warning">62.0</td>
            <td><app-status-badge status="Medium"></app-status-badge></td>
            <td><app-status-badge status="Active"></app-status-badge></td>
          </tr>
          <tr>
            <td class="font-mono text-xs text-blue">AST-455</td>
            <td class="font-semibold">Main Chiller</td><td>HVAC</td><td class="text-muted">Roof</td>
            <td class="font-bold text-danger">82.5</td>
            <td><app-status-badge status="High"></app-status-badge></td>
            <td><app-status-badge status="InProgress"></app-status-badge></td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>

  <!-- Create / Update Asset -->
  <div class="pms-card">
    <h4 class="section-title">Create / Update Asset</h4>
    <div class="form-grid">
      <div class="space-y-1"><label class="pms-label">Asset Name</label>
        <input [(ngModel)]="form.assetName" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Asset Type</label>
        <select [(ngModel)]="form.assetType" class="pms-select">
          <option>Lift</option><option>HVAC</option><option>Pump</option><option>Generator</option>
        </select>
      </div>
      <div class="space-y-1"><label class="pms-label">Location</label>
        <input [(ngModel)]="form.location" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Installation Date</label>
        <input [(ngModel)]="form.installationDate" type="date" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Manufacturer</label>
        <input [(ngModel)]="form.manufacturer" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Model Number</label>
        <input [(ngModel)]="form.modelNumber" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Maintenance Interval (days)</label>
        <input [(ngModel)]="form.maintenanceIntervalDays" type="number" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Criticality Level (1-5)</label>
        <input [(ngModel)]="form.criticalityLevel" type="number" min="1" max="5" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Expected Lifespan (years)</label>
        <input [(ngModel)]="form.expLifespanYears" type="number" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Status</label>
        <select [(ngModel)]="form.status" class="pms-select">
          <option>Active</option><option>Maintenance</option><option>Retired</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-outline" (click)="generateQR()">📱 Generate Asset QR</button>
      <button class="btn-primary" (click)="saveAsset()">💾 Save Asset</button>
    </div>
    <div *ngIf="qrCode" class="mt-3 text-xs text-blue">QR Code: {{ qrCode }}</div>
  </div>
</div>
