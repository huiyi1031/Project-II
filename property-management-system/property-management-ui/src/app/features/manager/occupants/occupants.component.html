<!-- Tenant/Owner Management -->
<div class="fade-in space-y-4">
  <div class="pms-card">
    <div class="flex flex-wrap gap-3 items-end mb-3">
      <h4 class="section-title mb-0 flex-1">Tenant / Owner Management</h4>
      <input [(ngModel)]="search" placeholder="Name / ID / Unit" class="pms-input w-52"/>
      <select [(ngModel)]="filter" class="pms-select w-36">
        <option>All</option><option>Owner</option><option>Tenant</option><option>Resident</option>
      </select>
    </div>
    <table class="pms-table">
      <thead>
        <tr><th>Name</th><th>ID</th><th>Role</th><th>Unit</th><th>Contact</th><th>Status</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let o of occupants">
          <td class="font-semibold">{{ o.fullName }}</td>
          <td class="font-mono text-xs text-blue">OCC-{{ o.occupantID }}</td>
          <td>{{ o.occupantType }}</td>
          <td class="text-muted">—</td>
          <td class="text-muted text-xs">{{ o.contactNumber }}</td>
          <td><app-status-badge [status]="o.occupantStatus"></app-status-badge></td>
          <td>
            <button class="btn-outline text-xs px-2 py-1 mr-1" (click)="editOccupant(o)">Edit</button>
            <button class="btn-danger text-xs px-2 py-1" (click)="toggleStatus(o)">
              {{ o.occupantStatus === 'Active' ? 'Deactivate' : 'Activate' }}
            </button>
          </td>
        </tr>
        <ng-container *ngIf="occupants.length === 0">
          <tr>
            <td class="font-semibold">Nur Ain</td>
            <td class="font-mono text-xs text-blue">OCC-104</td>
            <td>Owner</td><td class="text-muted">A-12-05</td>
            <td class="text-muted text-xs">012-8899000</td>
            <td><app-status-badge status="Active"></app-status-badge></td>
            <td><button class="btn-outline text-xs px-2 py-1">Edit</button></td>
          </tr>
          <tr>
            <td class="font-semibold">Ravi Kumar</td>
            <td class="font-mono text-xs text-blue">OCC-239</td>
            <td>Tenant</td><td class="text-muted">B-08-12</td>
            <td class="text-muted text-xs">012-5560011</td>
            <td><app-status-badge status="Inactive"></app-status-badge></td>
            <td><button class="btn-outline text-xs px-2 py-1">Edit</button></td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>

  <!-- Create / Update Form -->
  <div class="pms-card">
    <h4 class="section-title">{{ editMode ? 'Update' : 'Create' }} Occupant Record</h4>
    <div class="form-grid">
      <div class="space-y-1"><label class="pms-label">Full Name</label>
        <input [(ngModel)]="form.fullName" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Identification No</label>
        <input [(ngModel)]="form.identificationNo" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Contact Number</label>
        <input [(ngModel)]="form.contactNumber" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Email</label>
        <input [(ngModel)]="form.email" type="email" class="pms-input"/></div>
      <div class="space-y-1"><label class="pms-label">Property Unit</label>
        <select [(ngModel)]="form.unitID" class="pms-select">
          <option value="1">A-12-05</option><option value="2">B-08-12</option>
        </select>
      </div>
      <div class="space-y-1"><label class="pms-label">Role Type</label>
        <select [(ngModel)]="form.occupantType" class="pms-select">
          <option>Tenant</option><option>Owner</option><option>Resident</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-outline" (click)="resetForm()">Cancel</button>
      <button class="btn-primary" (click)="saveOccupant()">💾 Save Record</button>
    </div>
  </div>
</div>
