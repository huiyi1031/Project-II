<!-- ══════ HEADER NAV BAR ══════ -->
<header class="app-header" (click)="$event.stopPropagation()">
  <div class="header-inner">

    <!-- ── Brand / Logo ─────────────────────────────────────────────── -->
    <div class="brand" (click)="navigate({label:'Dashboard',route:'dashboard'})">
      <svg class="brand-logo" width="36" height="36" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <circle cx="110" cy="110" r="100" fill="#0f172a" />
        <g opacity="0.25">
          <path d="M45 55 Q50 70 65 75 Q50 80 45 95 Q40 80 25 75 Q40 70 45 55 Z" fill="#fbbf24" />
          <path d="M175 45 Q178 55 188 58 Q178 61 175 71 Q172 61 162 58 Q172 55 175 45 Z" fill="#fbbf24" />
          <path d="M35 155 Q38 165 48 168 Q38 171 35 181 Q32 171 22 168 Q32 165 35 155 Z" fill="#fbbf24" />
        </g>
        <rect x="55" y="105" width="110" height="65" rx="4" fill="#ffffff" />
        <rect x="95" y="130" width="30" height="40" rx="3" fill="#0f172a" />
        <circle cx="118" cy="150" r="2.5" fill="#ffffff" />
        <rect x="68" y="118" width="18" height="18" rx="2" fill="#0f172a" opacity="0.6" />
        <rect x="134" y="118" width="18" height="18" rx="2" fill="#0f172a" opacity="0.6" />
        <path d="M55 105 C55 75, 75 55, 110 55 C145 55, 165 75, 165 105 L165 110 L55 110 Z" fill="#f59e0b" />
        <rect x="100" y="48" width="20" height="20" rx="2" fill="#d97706" />
        <rect x="52" y="105" width="116" height="6" rx="2" fill="#d97706" />
        <path d="M185 95 Q188 108 201 111 Q188 114 185 127 Q182 114 169 111 Q182 108 185 95 Z" fill="#fbbf24" />
        <path d="M35 85 Q38 98 51 101 Q38 104 35 117 Q32 104 19 101 Q32 98 35 85 Z" fill="#fbbf24" />
        <path d="M160 145 Q162 152 169 154 Q162 156 160 163 Q158 156 151 154 Q158 152 160 145 Z" fill="#fbbf24" />
      </svg>
      <div class="brand-text">
        <span class="brand-name">Maintenance &amp; Upkeep</span>
        <span class="brand-role">{{ roleLabel }}</span>
      </div>
    </div>

    <!-- ── Hamburger (mobile) ───────────────────────────────────────── -->
    <button class="hamburger" (click)="toggleMobile()" [class.active]="isMobileMenuOpen">
      <span></span><span></span><span></span>
    </button>

    <!-- ── Desktop Nav ──────────────────────────────────────────────── -->
    <nav class="nav-menu" [class.nav-open]="isMobileMenuOpen">
      <ng-container *ngFor="let item of menuItems">

        <!-- Simple link (no children) -->
        <button *ngIf="!item.children"
                class="nav-item"
                [class.nav-active]="isActive(item)"
                (click)="navigate(item)">
          {{ item.label }}
        </button>

        <!-- Dropdown group -->
        <div *ngIf="item.children" class="nav-dropdown-wrap" (click)="$event.stopPropagation()">
          <button class="nav-item nav-has-dropdown"
                  [class.nav-active]="isActive(item)"
                  (click)="toggleDropdown(item.label, $event)">
            {{ item.label }}
            <svg class="chevron" [class.chevron-open]="openDropdown === item.label"
                 width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="nav-dropdown" *ngIf="openDropdown === item.label">
            <button *ngFor="let child of item.children"
                    class="nav-dropdown-item"
                    [class.nav-active]="activeItem === child.route"
                    (click)="navigate(child)">
              {{ child.label }}
            </button>
          </div>
        </div>

      </ng-container>
    </nav>

    <!-- ── Right section: User ──────────────────────────────────────── -->
    <div class="header-right">
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-email">{{ userEmail }}</span>
      </div>
      <div class="profile-wrap" (click)="$event.stopPropagation()">
        <button class="avatar-btn" (click)="toggleProfileMenu($event)">
          {{ getInitial() }}
        </button>
        <div class="profile-dropdown" *ngIf="isProfileMenuOpen">
          <button class="profile-item"
                  (click)="navigate({label:'Profile',route:'profile'}); isProfileMenuOpen = false">
            My Profile
          </button>
          <button *ngIf="roleLabel === 'Occupant' && occupantType !== 'Tenant'"
                  class="profile-item"
                  (click)="navigate({label:'Family',route:'family'}); isProfileMenuOpen = false">
            My Family Member
          </button>
          <button *ngIf="roleLabel === 'Occupant' && occupantType === 'Owner'"
                  class="profile-item"
                  (click)="navigate({label:'Tenants',route:'tenants'}); isProfileMenuOpen = false">
            My Tenants
          </button>
          <hr class="profile-divider"/>
          <button class="profile-item profile-logout" (click)="logout()">
            Logout
          </button>
        </div>
      </div>
    </div>

  </div>
</header>

<!-- ══════ MAIN CONTENT ══════ -->
<main class="app-main">
  <div class="fade-in">
    <router-outlet></router-outlet>
  </div>
</main>
