<!-- Main App Shell: Sidebar + Content Area -->
<div class="flex min-h-screen">

  <!-- ══════ SIDEBAR ══════ -->
  <aside
    class="w-[260px] flex-shrink-0 bg-sidebar-gradient text-white
           flex flex-col sticky top-0 h-screen overflow-y-auto
           border-r border-[#1e4f91] z-20">

    <!-- Brand -->
    <div class="px-4 pt-5 pb-2">
      <div class="font-extrabold text-lg tracking-tight mb-1">🏢 PMS Portal</div>
      <div class="text-xs text-[#c2d9ff] mb-3">Property Management System</div>
      <!-- Role pill -->
      <div class="inline-block bg-white/15 border border-white/25 rounded-full
                  px-3 py-1 text-xs mb-1">
        Role: <span class="font-semibold">{{ roleLabel }}</span>
      </div>
    </div>

    <hr class="border-white/10 mx-4 mb-1"/>

    <!-- Navigation Menu -->
    <nav class="flex-1 px-2 py-2">
      <div class="text-[10px] text-[#c2d9ff] uppercase tracking-widest px-2 mb-2 mt-1">
        Navigation
      </div>
      <button
        *ngFor="let item of menuItems"
        (click)="navigate(item)"
        [class.active]="activeItem === item.route"
        class="menu-btn">
        <span class="text-base leading-none">{{ item.icon }}</span>
        <span>{{ item.label }}</span>
      </button>
    </nav>

    <!-- Logout -->
    <div class="p-3 border-t border-white/10">
      <button
        (click)="logout()"
        class="w-full bg-white/10 border border-white/25 text-white rounded-xl
               py-2.5 text-sm font-semibold hover:bg-white/20 transition-all flex items-center justify-center gap-2">
        🚪 Logout
      </button>
    </div>
  </aside>

  <!-- ══════ MAIN CONTENT ══════ -->
  <div class="flex-1 flex flex-col min-w-0">

    <!-- Top Bar -->
    <header class="bg-white border-b border-border px-5 py-3
                   flex justify-between items-center sticky top-0 z-10 shadow-sm">
      <div>
        <h3 class="font-bold text-navy text-base m-0">{{ pageTitle }}</h3>
        <p class="text-xs text-muted m-0 mt-0.5">{{ breadcrumb }}</p>
      </div>
      <div class="flex items-center gap-3 relative">
        <div class="text-right hidden md:block">
          <div class="text-sm font-semibold text-navy">{{ userName }}</div>
          <div class="text-xs text-muted">{{ userEmail }}</div>
        </div>
        <button (click)="toggleProfileMenu()" class="w-9 h-9 rounded-full bg-light-blue border border-border grid place-items-center text-lg cursor-pointer hover:bg-gray-100 transition-colors">
          👤
        </button>
        <!-- Dropdown Menu -->
        <div *ngIf="isProfileMenuOpen" class="absolute top-12 right-0 w-48 bg-white rounded-xl shadow-lg border border-border py-2 z-50 animate-fade-in-down">
          <button (click)="navigate({route: 'profile', label: 'My Profile', icon: '👤'}); isProfileMenuOpen = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex gap-2 items-center">
            👤 My Profile
          </button>
          <button *ngIf="roleLabel === 'Occupant' && occupantType !== 'Tenant'" (click)="navigate({route: 'family', label: 'My Family Member', icon: '👨‍👩‍👧'}); isProfileMenuOpen = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex gap-2 items-center">
            👨‍👩‍👧 My Family Member
          </button>
          <button *ngIf="roleLabel === 'Occupant' && occupantType === 'Owner'" (click)="navigate({route: 'tenants', label: 'My Tenants', icon: '🔑'}); isProfileMenuOpen = false" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex gap-2 items-center">
            🔑 My Tenants
          </button>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-5 bg-bg">
      <div class="fade-in">
        <router-outlet></router-outlet>
      </div>
    </main>

  </div>
</div>
