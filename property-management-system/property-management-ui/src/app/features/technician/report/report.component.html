<!-- Technician Report -->
<div class="fade-in space-y-4">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
    <div class="kpi-card"><div class="kpi-title">Jobs Completed</div><div class="kpi-value text-success">18</div></div>
    <div class="kpi-card"><div class="kpi-title">Acceptance Rate</div><div class="kpi-value text-blue">92%</div></div>
    <div class="kpi-card"><div class="kpi-title">Avg Completion</div><div class="kpi-value text-navy">3.4h</div></div>
    <div class="kpi-card"><div class="kpi-title">Rating</div><div class="kpi-value text-warning">⭐ 4.7</div></div>
  </div>
  <div class="pms-card">
    <h4 class="section-title">Performance Trend</h4>
    <div class="space-y-3">
      <div *ngFor="let m of months">
        <div class="flex justify-between text-xs text-muted mb-1">
          <span>{{ m.label }}</span>
          <span class="font-semibold text-navy">{{ m.count }} jobs</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" [style.width]="m.pct"></div>
        </div>
      </div>
    </div>
  </div>
</div>
