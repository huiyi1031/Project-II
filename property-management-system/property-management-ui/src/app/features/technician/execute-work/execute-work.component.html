<!-- Execute Work Order -->
<div class="fade-in space-y-4 max-w-3xl">
  <div class="pms-card">
    <h4 class="section-title">Execute Work Order Module</h4>
    <div class="form-grid">
      <div class="space-y-1">
        <label class="pms-label">Work Order ID</label>
        <input [(ngModel)]="workOrderId" class="pms-input" placeholder="e.g. WO-145"/>
      </div>
      <div class="space-y-1">
        <label class="pms-label">Update Status</label>
        <select [(ngModel)]="newStatus" class="pms-select">
          <option>Accepted</option>
          <option>InProgress</option>
          <option>Completed</option>
          <option>Closed</option>
        </select>
      </div>
      <div class="md:col-span-2 space-y-1">
        <label class="pms-label">Work Progress Notes</label>
        <textarea [(ngModel)]="progressNotes" class="pms-textarea"
                  placeholder="Describe current work progress..."></textarea>
      </div>
      <div class="md:col-span-2 space-y-1">
        <label class="pms-label">Completion Report</label>
        <textarea [(ngModel)]="completionReport" class="pms-textarea"
                  placeholder="Detailed completion report..."></textarea>
      </div>
      <div class="md:col-span-2 space-y-1">
        <label class="pms-label">Upload Evidence (Before/After Photos)</label>
        <div class="upload-box" (click)="evidenceInput.click()">
          <div>
            <div class="text-2xl">📷</div>
            <div class="text-sm">Upload before/after photos</div>
            <div *ngIf="evidenceFile" class="text-xs text-blue mt-1">📎 {{ evidenceFile }}</div>
          </div>
        </div>
        <input #evidenceInput type="file" class="hidden" accept="image/*"
               (change)="onEvidence($event)"/>
      </div>
    </div>
    <div *ngIf="msg" class="mt-3 text-sm text-success bg-[#e7f8ef] border border-[#a3e4c8] rounded-xl px-4 py-2.5">
      ✅ {{ msg }}
    </div>
    <div class="form-actions">
      <button class="btn-outline" (click)="saveProgress()">💾 Save Progress</button>
      <button class="btn-primary" (click)="submitCompletion()">✅ Submit Completion</button>
    </div>
  </div>

  <!-- Execution History -->
  <div class="pms-card">
    <h4 class="section-title">Execution History</h4>
    <table class="pms-table">
      <thead><tr><th>WO ID</th><th>Maintenance Type</th><th>Date</th><th>Result</th></tr></thead>
      <tbody>
        <tr *ngFor="let h of history">
          <td class="font-mono text-xs text-blue">WO-{{ h.workOrderID }}</td>
          <td>{{ h.maintenanceType }}</td>
          <td class="text-muted text-xs">{{ h.maintenanceDate | date:'dd MMM yyyy' }}</td>
          <td><app-status-badge [status]="h.resultStatus"></app-status-badge></td>
        </tr>
        <ng-container *ngIf="history.length === 0">
          <tr>
            <td class="font-mono text-xs text-blue">WO-131</td>
            <td>Preventive</td>
            <td class="text-muted text-xs">02 Apr 2026</td>
            <td><app-status-badge status="Completed"></app-status-badge></td>
          </tr>
          <tr>
            <td class="font-mono text-xs text-blue">WO-127</td>
            <td>Corrective</td>
            <td class="text-muted text-xs">28 Mar 2026</td>
            <td><app-status-badge status="Completed"></app-status-badge></td>
          </tr>
        </ng-container>
      </tbody>
    </table>
  </div>
</div>
